<template name="loginPage">
  <div class="vtf-guest">
    <div class="vtf-auth-card">
      <div class="vtf-brand-block">
        <div class="vtf-logo-mark">V</div>
        <div>
          <h1 class="vtf-brand-title">V Task Force</h1>
          <p class="vtf-muted">Operational clarity for serious teams</p>
        </div>
      </div>
      <form class="vtf-form js-login-form">
        <label class="vtf-field">
          <span>Email</span>
          <input class="vtf-input" type="email" name="email" autocomplete="username" required>
        </label>
        <label class="vtf-field">
          <span>Password</span>
          <input class="vtf-input" type="password" name="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="vtf-btn vtf-btn-primary vtf-btn-block">Sign in</button>
      </form>
      <p class="vtf-muted vtf-auth-switch">New here? <a href="/signup" class="vtf-link">Create account</a></p>
    </div>
  </div>
</template>
